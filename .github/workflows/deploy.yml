name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *" # refresh agenda data every 30 minutes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch calendar events (private ICS, build-time only)
        run: node scripts/fetch-events.mjs
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
          TZ: America/New_York
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
